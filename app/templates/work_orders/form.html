{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h3>{% if work_order %}Edit Work Order{% else %}Add Work Order{% endif %}</h3>
    <div class="subtitle">{% if work_order %}Update work order details{% else %}Register a new work order{% endif %}</div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header"><i class="bi bi-file-earmark-text me-1"></i> Work Order Details</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Plant <span class="text-danger">*</span></label>
                        <select name="plant_id" class="form-select" required>
                            <option value="">Select Plant</option>
                            {% for p in plants %}
                            <option value="{{ p.id }}" {% if work_order and work_order.plant_id == p.id %}selected{% endif %}>{{ p.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Work Order Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" value="{{ work_order.name if work_order else '' }}" placeholder="e.g. WO-2024-001" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i> Save</button>
                        <a href="{{ url_for('work_orders.list') }}" class="btn btn-outline-secondary"><i class="bi bi-x me-1"></i> Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
