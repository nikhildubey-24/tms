{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h3>{% if mine %}Edit Mine{% else %}Add Mine{% endif %}</h3>
    <div class="subtitle">{% if mine %}Update mine details{% else %}Register a new mine{% endif %}</div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header"><i class="bi bi-geo-alt me-1"></i> Mine Details</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Mine Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" value="{{ mine.name if mine else '' }}" placeholder="e.g. Jindal Mine" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i> Save</button>
                        <a href="{{ url_for('mines.list') }}" class="btn btn-outline-secondary"><i class="bi bi-x me-1"></i> Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
