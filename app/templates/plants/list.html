{% extends "base.html" %}
{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <div>
        <h3><i class="bi bi-building me-1"></i> Plants</h3>
        <div class="subtitle">Manage plant locations</div>
    </div>
    <a href="{{ url_for('plants.add') }}" class="btn btn-primary"><i class="bi bi-plus-circle me-1"></i> Add Plant</a>
</div>

<div class="table-wrap">
    <table class="table">
        <thead>
            <tr>
                <th>#</th>
                <th>Plant Name</th>
                <th>Location</th>
                <th class="no-print text-end">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for p in plants %}
            <tr>
                <td class="text-muted">{{ p.id }}</td>
                <td><strong>{{ p.name }}</strong></td>
                <td>{{ p.location or '-' }}</td>
                <td class="no-print text-end">
                    <div class="action-group justify-content-end">
                        <a href="{{ url_for('plants.edit', id=p.id) }}" class="btn btn-sm btn-outline-primary" title="Edit"><i class="bi bi-pencil"></i></a>
                        <form method="POST" action="{{ url_for('plants.delete', id=p.id) }}" style="display:inline;" onsubmit="return confirm('Delete this plant? Related trips will lose plant reference.')">
                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete"><i class="bi bi-trash"></i></button>
                        </form>
                    </div>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="4" class="empty-state"><div class="icon"><i class="bi bi-building"></i></div>No plants added yet</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
