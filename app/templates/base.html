<!DOCTYPE html>
<html lang="en" data-theme="{{ 'dark' if request.cookies.get('theme') == 'dark' else 'light' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    {% if current_user.is_authenticated %}
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand text-white" href="{{ url_for('main.dashboard') }}">
                <i class="bi bi-truck-front me-1"></i> <span>TMS</span> Transport
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="{{ url_for('main.dashboard') }}"><i class="bi bi-speedometer2 me-1"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="{{ url_for('trips.list') }}"><i class="bi bi-journal me-1"></i> Trips</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="{{ url_for('transporters.list') }}"><i class="bi bi-people me-1"></i> Transporters</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="{{ url_for('plants.list') }}"><i class="bi bi-building me-1"></i> Plants</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="{{ url_for('reports.index') }}"><i class="bi bi-bar-chart me-1"></i> Reports</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <button class="theme-toggle me-2" onclick="toggleTheme()" title="Toggle dark mode">
                            <i class="bi bi-moon-fill" id="themeIcon"></i>
                        </button>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="{{ url_for('auth.logout') }}"><i class="bi bi-box-arrow-right"></i> Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    {% endif %}

    <div class="container-fluid px-4 py-3">
        {% block content %}{% endblock %}
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
    // ── Toast Notifications ──
    function showToast(message, category) {
        var icon = 'info-circle';
        if (category === 'success') icon = 'check-circle';
        else if (category === 'danger') icon = 'exclamation-circle';
        else if (category === 'warning') icon = 'exclamation-triangle';

        var container = document.getElementById('toastContainer');
        var toast = document.createElement('div');
        toast.className = 'toast-notification toast-' + category;
        toast.innerHTML = '<i class="bi bi-' + icon + ' toast-icon"></i>' +
            '<span>' + message + '</span>' +
            '<button class="toast-close" onclick="this.parentElement.remove()">&times;</button>';

        container.appendChild(toast);
        setTimeout(function () {
            toast.style.animation = 'slideOut .3s ease forwards';
            setTimeout(function () { toast.remove(); }, 300);
        }, 4000);
    }

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    document.addEventListener('DOMContentLoaded', function () {
        {% for category, message in messages %}
        showToast('{{ message|e }}', '{{ category }}');
        {% endfor %}
    });
    {% endif %}
    {% endwith %}

    // ── Dark Mode Toggle ──
    function toggleTheme() {
        var html = document.documentElement;
        var current = html.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        document.getElementById('themeIcon').className = next === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        document.cookie = 'theme=' + next + ';path=/;max-age=' + (365 * 24 * 60 * 60);
    }

    (function () {
        var saved = localStorage.getItem('theme');
        if (saved) {
            document.documentElement.setAttribute('data-theme', saved);
            var icon = document.getElementById('themeIcon');
            if (icon) icon.className = saved === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        }
    })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
